<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starting...</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        .splash-container {
            width: 320px;
            height: 400px;
            background: rgba(15, 15, 20, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.4s ease-out;
        }

        .icon {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: pulse 2s infinite ease-in-out;
        }

        .title {
            color: #ffffff;
            font-size: 24px;
            font-weight: 600;
            margin: 0;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #888890;
            font-size: 14px;
            font-weight: 400;
            margin: 0;
        }

        .loader {
            margin-top: 40px;
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #6366f1;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 8px 32px rgba(99, 102, 241, 0.2); }
            50% { transform: scale(1.05); box-shadow: 0 12px 48px rgba(99, 102, 241, 0.4); }
            100% { transform: scale(1); box-shadow: 0 8px 32px rgba(99, 102, 241, 0.2); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <img src="/splash_icon.png" alt="App Icon" class="icon" />
        <h1 class="title">ElToolkit</h1>
        <p class="subtitle">Initializing core systems...</p>
        <div class="loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>
</body>
</html>
